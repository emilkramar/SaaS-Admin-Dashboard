# Builds the app with a base href for project pages (/repo-name/) and deploys to GitHub Pages.
# After the first successful run: Repo → Settings → Pages → Source = "GitHub Actions".

name: GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build for GitHub Pages
        env:
          BASE_HREF: /${{ github.event.repository.name }}/
        run: npx ng build --configuration production --base-href "$BASE_HREF"

      - name: SPA fallback (direct URL / refresh on nested routes)
        run: cp dist/sas/browser/index.html dist/sas/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/sas/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
